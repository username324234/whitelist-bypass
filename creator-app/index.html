<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div class="tab-bar">
  <div class="tab-bar-tabs" id="tabBar">
    <div class="tab-add" data-action="add-tab" title="New tab">+</div>
  </div>
  <div class="tab-bar-actions">
    <div class="tab-action-btn" id="btnVkCookies" title="Export VK cookies to vk-cookies.json for headless mode">VK Cookies</div>
    <div class="tab-action-btn" id="btnYandexCookies" title="Export Yandex cookies to cookies-yandex.json for headless mode">Yandex Cookies</div>
    <div class="tab-action-btn settings" id="btnSettings" title="Settings">Settings</div>
    <div class="tab-action-btn bot" id="tabBot">Bot: Off</div>
  </div>
</div>
<div class="toolbar" id="toolbar" style="display:none">
  <button class="btn-vk" id="btnVk">VK</button>
  <button class="btn-telemost" id="btnTelemost">Telemost</button>
  <button class="btn-headless" id="btnHeadlessVK">Headless VK</button>
  <button class="btn-headless-tm" id="btnHeadlessTM">Headless TM</button>
  <button class="btn-headless-wb" id="btnHeadlessWB">Headless WB</button>
  <span class="toolbar-spacer"></span>
  <span class="toolbar-label" id="tunnelLabel" style="display:none">Tunnel:</span>
  <select id="modeSelect" class="toolbar-select" style="display:none">
    <option value="dc">DC</option>
    <option value="pion-video">Video</option>
  </select>
  <span class="toolbar-icon" id="btnSaveLogs" title="Save logs"><img src="resources/icons8-download-64.png"></span>
</div>
<div class="content" id="content">
  <div class="welcome" id="welcome">
    <h1>Whitelist Bypass - Creator</h1>
    <p>Click + to add a tab</p>
  </div>
  <div class="headless-info" id="headlessInfo">
    <div class="headless-title" id="headlessTitle">Headless</div>
    <div class="headless-status" id="headlessStatus">Starting...</div>
    <div class="headless-call-info" id="headlessCallInfo">
      <div class="headless-row"><span class="headless-label">Join link:</span> <a id="headlessJoinLink" href="#" class="headless-link"></a><img class="headless-copy" src="resources/icons8-copy-50.png" data-copy="headlessJoinLink" title="Copy"></div>
      <div class="headless-row"><span class="headless-label">TURN:</span> <span id="headlessTurn"></span></div>
      <div class="headless-row"><span class="headless-label">Protocol:</span> <span id="headlessProtocol"></span></div>
    </div>
    <div class="headless-call-info" id="headlessCallInfoTM">
      <div class="headless-row"><span class="headless-label">Join link:</span> <a id="headlessTMJoinLink" href="#" class="headless-link"></a><img class="headless-copy" src="resources/icons8-copy-50.png" data-copy="headlessTMJoinLink" title="Copy"></div>
      <div class="headless-row"><span class="headless-label">Protocol:</span> <span id="headlessTMProtocol"></span></div>
    </div>
    <div class="headless-call-info" id="headlessCallInfoWB">
      <div class="headless-row"><span class="headless-label">Join link:</span> <a id="headlessWBJoinLink" href="#" class="headless-link"></a><img class="headless-copy" src="resources/icons8-copy-50.png" data-copy="headlessWBJoinLink" title="Copy"></div>
    </div>
  </div>
</div>
<div class="logs" id="logsPanel" style="display:none">
  <div class="log-panel">
    <div class="log-title">Relay <span class="log-clear-btn" id="btnClearRelay" title="Clear">&#x2715;</span><img class="log-download-btn" id="btnSaveLogsHeadless" src="resources/icons8-download-64.png" title="Save logs"></div>
    <div class="log-content relay" id="relayLog"></div>
  </div>
  <div class="log-panel" id="hookPanel">
    <div class="log-title">Hook <span class="log-clear-btn" id="btnClearHook" title="Clear">&#x2715;</span></div>
    <div class="log-content hook" id="hookLog"></div>
  </div>
</div>
<div class="popup-overlay" id="settingsPopup">
  <div class="popup">
    <h2>VK bot settings</h2>
    <label for="vkToken">Token</label>
    <input type="text" id="vkToken" placeholder="vk1.a.xxx...">
    <label for="vkGroupId">Group ID</label>
    <input type="number" id="vkGroupId" placeholder="123456789">
    <label for="vkUserId">User ID</label>
    <input type="number" id="vkUserId" placeholder="123456789">
    <div class="popup-buttons">
      <button class="btn-cancel" id="btnSettingsCancel">Cancel</button>
      <button class="btn-save" id="btnSettingsSave">Save</button>
    </div>
  </div>
</div>
<div class="popup-overlay" id="errorPopup">
  <div class="popup" style="padding:16px">
    <h2 class="error-title">Bot error</h2>
    <pre class="error-text" id="errorText"></pre>
    <div class="popup-buttons" style="margin-top:12px">
      <button class="btn-cancel" id="btnErrorClose">Close</button>
    </div>
  </div>
</div>
<script>require('./dist/renderer/index.js')</script>
</body>
</html>
